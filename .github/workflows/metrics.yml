name: Generate GitHub Metrics
on:
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      # 🏆 Achievements (stable & safe)
      - name: Achievements
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics.plugin.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 1
          plugin_achievements_threshold: C
      # LeetCode stats
      - name: LeetCode stats
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics.plugin.leetcode.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_leetcode: yes
          plugin_leetcode_user: PuthearithKeng  # <- Replace this
          plugin_leetcode_sections: solved, skills
          plugin_leetcode_limit_solved: 10
          plugin_leetcode_limit_skills: 8
      # 📅 Full-year Isometric Commit Calendar
      - name: Isometric Commit Calendar
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics.plugin.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
